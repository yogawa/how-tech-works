<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cara Kerja Teknologi — Visualisasi Interaktif untuk Pemula</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kumpulan visualisasi interaktif yang menjelaskan cara kerja teknologi — jaringan, sistem, keamanan, dan lainnya — dengan bahasa sederhana untuk pemula.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/*
  This shell is intentionally neutral. Each topic page in /topics is free to use its
  own palette, fonts and visual identity — the shell just needs to stay out of the way
  and read as plain "app chrome" regardless of what's loaded in the iframe.
*/
:root{
  --bg-sidebar:#fafafa;
  --bg-elevated:#f1f2f4;
  --border:#e3e5e9;
  --text:#1a1d23;
  --text-muted:#666d78;
  --text-faint:#9aa1ab;
  --accent:#4f46e5;
  --accent-soft:rgba(79,70,229,0.1);
  --accent-contrast:#ffffff;
  --sidebar-w:300px;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg-sidebar:#14161b;
    --bg-elevated:#1c1f26;
    --border:#282c34;
    --text:#e7e9ec;
    --text-muted:#9aa3b2;
    --text-faint:#5b6270;
    --accent:#818cf8;
    --accent-soft:rgba(129,140,248,0.16);
    --accent-contrast:#14161b;
  }
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Inter', system-ui, -apple-system, sans-serif;
  background:var(--bg-elevated);
  color:var(--text);
  overflow:hidden;
}

.app{display:flex; height:100vh; width:100vw;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100vh;
}

.sidebar-head{
  padding:22px 20px 16px;
  border-bottom:1px solid var(--border);
}
.brand-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.brand{display:flex; align-items:center; gap:9px;}
.brand-mark{
  width:26px; height:26px;
  flex-shrink:0;
  color:var(--accent);
}
.brand-mark svg{width:100%; height:100%;}
.brand-title{
  font-weight:700;
  font-size:15.5px;
  line-height:1.2;
  letter-spacing:-0.01em;
}
.brand-sub{
  font-size:12.5px;
  line-height:1.55;
  color:var(--text-muted);
  margin:10px 0 14px;
}

/* language switcher */
.lang-switch{
  display:flex;
  flex-shrink:0;
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
}
.lang-btn{
  font-size:11px;
  font-weight:600;
  letter-spacing:0.02em;
  background:transparent;
  border:none;
  color:var(--text-muted);
  padding:5px 9px;
  cursor:pointer;
  transition:background .15s, color .15s;
}
.lang-btn + .lang-btn{border-left:1px solid var(--border);}
.lang-btn:hover{color:var(--text);}
.lang-btn.active{background:var(--accent); color:var(--accent-contrast);}

.search-box{
  width:100%;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  padding:8px 11px;
  border-radius:6px;
  outline:none;
  transition:border-color .15s;
}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--text-faint);}

.topic-nav{
  flex:1;
  overflow-y:auto;
  padding:16px 14px 20px;
}
.topic-nav::-webkit-scrollbar{width:6px;}
.topic-nav::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}

.nav-category{margin-bottom:20px;}
.nav-category-title{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--text-faint);
  padding:0 8px 8px;
}
.cat-dot{
  width:7px; height:7px;
  border-radius:50%;
  flex-shrink:0;
}

.nav-item{
  display:block;
  width:100%;
  text-align:left;
  background:transparent;
  border:1px solid transparent;
  border-radius:8px;
  padding:10px 12px;
  margin-bottom:3px;
  cursor:pointer;
  color:var(--text);
  transition:background .15s, border-color .15s;
}
.nav-item:hover{background:var(--bg-elevated);}
.nav-item.active{
  background:var(--accent-soft);
  border-color:var(--accent);
}
.nav-item-title{
  font-weight:600;
  font-size:13.5px;
  margin-bottom:3px;
}
.nav-item.active .nav-item-title{color:var(--accent);}
.nav-item-desc{
  font-size:12px;
  line-height:1.45;
  color:var(--text-muted);
}

.nav-empty{
  font-size:12.5px;
  color:var(--text-faint);
  padding:8px;
  font-style:italic;
}

.sidebar-foot{
  padding:14px 20px;
  border-top:1px solid var(--border);
  font-size:12px;
}
.sidebar-foot a{color:var(--text-muted); text-decoration:none;}
.sidebar-foot a:hover{color:var(--accent);}

/* ===== MAIN / VIEWER ===== */
.main{
  flex:1;
  position:relative;
  height:100vh;
  background:var(--bg-elevated);
}
.viewer{
  width:100%; height:100%;
  border:none;
  display:none;
}
.empty-state{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px 40px;
}
.empty-state h2{
  font-size:clamp(20px,2.6vw,26px);
  font-weight:700;
  letter-spacing:-0.01em;
  margin:0 0 8px;
}
.empty-state p{
  max-width:420px;
  font-size:14px;
  line-height:1.6;
  color:var(--text-muted);
  margin:0;
}

/* ===== MOBILE ===== */
.sidebar-toggle{
  display:none;
  position:fixed;
  top:14px; left:14px;
  z-index:20;
  width:38px; height:38px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg-sidebar);
  color:var(--text);
  font-size:16px;
  cursor:pointer;
}

@media (max-width:820px){
  .sidebar-toggle{display:block;}
  .sidebar{
    position:fixed;
    top:0; left:0; bottom:0;
    z-index:15;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,0.25);
  }
  .sidebar.open{transform:translateX(0);}
  .main{width:100vw;}
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="brand-row">
        <div class="brand">
          <span class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
          </span>
          <div class="brand-title" id="brandTitle"></div>
        </div>
        <div class="lang-switch" id="langSwitch"></div>
      </div>
      <p class="brand-sub" id="brandSub"></p>
      <input type="text" id="searchInput" class="search-box">
    </div>
    <nav class="topic-nav" id="topicNav"></nav>
    <div class="sidebar-foot">
      <a href="README.md" id="aboutLink" target="_blank" rel="noopener"></a>
    </div>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>

  <main class="main">
    <iframe class="viewer" id="viewer" title="Konten topik"></iframe>
    <div class="empty-state" id="emptyState">
      <h2 id="emptyTitle"></h2>
      <p id="emptyDesc"></p>
    </div>
  </main>

</div>

<script>
/*
  Menambah topik baru:
  1. Buat file HTML mandiri (self-contained) di dalam folder /topics. Topik bebas
     memakai palet warna, font, dan gaya visualnya sendiri — shell ini sengaja dibuat
     netral agar tidak bentrok dengan tampilan topik apa pun.
  2. Tambahkan entri baru pada array `topics` di bawah (categoryKey + key + file).
  3. Tambahkan key yang sama (categories.<categoryKey> dan topics.<key>.title/.desc)
     ke SETIAP file di /i18n (id.json, en.json, dst).

  Menambah bahasa baru untuk chrome (sidebar dsb):
  1. Duplikat i18n/id.json menjadi i18n/<kode-bahasa>.json, terjemahkan isinya.
  2. Tambahkan kode bahasa itu ke array LANGS di bawah.
*/
const LANGS = [
  { code: 'id', label: 'ID' },
  { code: 'en', label: 'EN' }
];
const DEFAULT_LANG = 'en';

// Rotating accent used only for the small category dot in the sidebar — a wayfinding
// aid, not a per-topic theme. It has no bearing on how a topic page styles itself.
const CATEGORY_DOT_COLORS = ['#6366f1', '#0ea5e9', '#f59e0b', '#ec4899', '#10b981', '#a855f7'];

const topics = [
  {
    categoryKey: "network",
    items: [
      { key: "tcpIpLayers", file: "topics/tcp-ip-layers.html" },
      { key: "dns", file: "topics/dns.html" }
    ]
  },
  {
    categoryKey: "security",
    items: [
      { key: "asymmetricEncryption", file: "topics/asymmetric-encryption.html" },
      { key: "blockchain", file: "topics/blockchain.html" },
      { key: "httpsTls", file: "topics/https-tls.html" }
    ]
  },
  {
    categoryKey: "systems",
    items: [
      { key: "multithreading", file: "topics/multithreading.html" },
      { key: "dockerVsVm", file: "topics/docker-vs-vm.html" },
      { key: "aotVsJit", file: "topics/aot-vs-jit.html" }
    ]
  },
  {
    categoryKey: "tools",
    items: [
      { key: "git", file: "topics/git.html" }
    ]
  },
  {
    categoryKey: "architecture",
    items: [
      { key: "eventDrivenArchitecture", file: "topics/event-driven-architecture.html" }
    ]
  },
  {
    categoryKey: "ai",
    items: [
      { key: "llm", file: "topics/llm.html" }
    ]
  }
];

const topicNav = document.getElementById('topicNav');
const viewer = document.getElementById('viewer');
const emptyState = document.getElementById('emptyState');
const searchInput = document.getElementById('searchInput');
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebarToggle');
const langSwitch = document.getElementById('langSwitch');

let currentLang = localStorage.getItem('lang') || DEFAULT_LANG;
let i18n = null;
let activeButton = null;
let activeFile = null;

function isValidLang(code){
  return LANGS.some(l => l.code === code);
}

async function loadChromeI18n(lang){
  const res = await fetch('i18n/' + lang + '.json');
  return res.json();
}

function renderLangSwitch(){
  langSwitch.innerHTML = '';
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l.code === currentLang ? ' active' : '');
    btn.textContent = l.label;
    btn.addEventListener('click', () => setLanguage(l.code, { reloadIframe: true }));
    langSwitch.appendChild(btn);
  });
}

function renderChrome(){
  document.documentElement.lang = currentLang;
  document.getElementById('brandTitle').innerHTML = i18n.ui.brandTitle;
  document.getElementById('brandSub').textContent = i18n.ui.brandSub;
  searchInput.placeholder = i18n.ui.searchPlaceholder;
  sidebarToggle.setAttribute('aria-label', i18n.ui.sidebarToggleAria);
  document.getElementById('emptyTitle').textContent = i18n.ui.emptyTitle;
  document.getElementById('emptyDesc').textContent = i18n.ui.emptyDesc;
  document.getElementById('aboutLink').innerHTML = i18n.ui.aboutLink;
  renderLangSwitch();
}

function renderNav(filterText){
  const query = (filterText || '').trim().toLowerCase();
  topicNav.innerHTML = '';
  let totalShown = 0;
  let firstFile = null, firstButton = null;

  topics.forEach((category, categoryIndex) => {
    const catLabel = i18n.categories[category.categoryKey] || category.categoryKey;
    const items = category.items.filter(item => {
      const t = i18n.topics[item.key];
      if(!t) return false;
      return !query || t.title.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query);
    });
    if(items.length === 0) return;

    const catEl = document.createElement('div');
    catEl.className = 'nav-category';

    const catTitle = document.createElement('div');
    catTitle.className = 'nav-category-title';
    const dotColor = CATEGORY_DOT_COLORS[categoryIndex % CATEGORY_DOT_COLORS.length];
    catTitle.innerHTML = '<span class="cat-dot" style="background:' + dotColor + '"></span><span>' + catLabel + '</span>';
    catEl.appendChild(catTitle);

    items.forEach(item => {
      const t = i18n.topics[item.key];
      totalShown++;
      const btn = document.createElement('button');
      btn.className = 'nav-item' + (item.file === activeFile ? ' active' : '');
      btn.innerHTML = '<div class="nav-item-title">' + t.title + '</div>' +
                      '<div class="nav-item-desc">' + t.desc + '</div>';
      btn.addEventListener('click', () => openTopic(item.file, btn));
      catEl.appendChild(btn);

      if(!firstFile){ firstFile = item.file; firstButton = btn; }
      if(item.file === activeFile) activeButton = btn;
    });

    topicNav.appendChild(catEl);
  });

  if(totalShown === 0){
    const empty = document.createElement('div');
    empty.className = 'nav-empty';
    empty.textContent = i18n.ui.noResults;
    topicNav.appendChild(empty);
  }

  return { firstFile, firstButton };
}

function withLang(file){
  return file + '?lang=' + currentLang;
}

function openTopic(file, button){
  activeFile = file;
  viewer.src = withLang(file);
  viewer.style.display = 'block';
  emptyState.style.display = 'none';
  if(activeButton) activeButton.classList.remove('active');
  button.classList.add('active');
  activeButton = button;
  if(window.innerWidth <= 820) sidebar.classList.remove('open');
}

// `reloadIframe: true` when the user clicks the switcher in this page (needs the iframe
// to re-fetch content in the new language). `false` when the change originated *from*
// the topic iframe itself via postMessage, so it already re-rendered and only the
// chrome/sidebar need to catch up.
async function setLanguage(lang, opts){
  opts = opts || {};
  if(!isValidLang(lang)) return;
  if(lang === currentLang && !opts.force) return;
  currentLang = lang;
  localStorage.setItem('lang', lang);
  i18n = await loadChromeI18n(lang);
  renderChrome();
  const result = renderNav(searchInput.value);
  if(opts.reloadIframe && activeFile){
    viewer.src = withLang(activeFile);
  }
  if(!activeFile && result.firstFile){
    openTopic(result.firstFile, result.firstButton);
  }
}

searchInput.addEventListener('input', (e) => {
  renderNav(e.target.value);
});

sidebarToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
});

// Allow a topic page (loaded in the iframe) to tell the parent the user
// switched language from inside the topic itself, so the sidebar/chrome follow suit.
window.addEventListener('message', (event) => {
  if(event.data && event.data.type === 'howitworks:lang-change' && isValidLang(event.data.lang)){
    setLanguage(event.data.lang, { reloadIframe: false });
  }
});

(async function init(){
  i18n = await loadChromeI18n(currentLang);
  renderChrome();
  const initial = renderNav('');
  if(initial.firstFile){
    openTopic(initial.firstFile, initial.firstButton);
  }
})();
</script>
</body>
</html>
