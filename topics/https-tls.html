<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTTPS/TLS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #060B12;
  --panel: rgba(45, 212, 191, 0.05);
  --panel-border: rgba(45, 212, 191, 0.14);
  --text: #E8F4F2;
  --text-dim: rgba(232, 244, 242, 0.68);
  --text-faint: rgba(232, 244, 242, 0.4);

  --teal: #2DD4BF;
  --gold: #FBBF24;
  --red: #F87171;
  --violet: #A78BFA;
  --blue: #60A5FA;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow-x: hidden; }

body {
  background-color: var(--bg);
  background-image:
    radial-gradient(circle at 15% -10%, rgba(45, 212, 191, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 90% 10%, rgba(251, 191, 36, 0.06) 0%, transparent 50%);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.wrap { max-width: 1200px; width: 100%; }

/* Header */
header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.header-text { max-width: 660px; }
.eyebrow {
  font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--teal);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: inline-block;
  padding: 4px 10px; background: rgba(45, 212, 191, 0.1); border-radius: 4px; font-weight: 600;
}
h1 { font-size: clamp(30px, 4vw, 46px); font-weight: 800; margin: 10px 0; line-height: 1.12; letter-spacing: -0.01em; }
h1 span { color: var(--gold); }
.lede { font-size: 16.5px; color: var(--text-dim); line-height: 1.65; }

.lang-switch { display: flex; background: var(--bg); border: 1px solid var(--panel-border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.lang-btn { font-family: 'Roboto Mono', monospace; font-size: 12px; background: transparent; border: none; color: var(--text-faint); padding: 8px 16px; cursor: pointer; transition: all .2s; }
.lang-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.lang-btn.active { background: var(--teal); color: #04211d; font-weight: 700; }

/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  background: var(--panel); border: 1.5px solid var(--panel-border); color: var(--text-dim);
  padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13.5px;
  font-family: 'Plus Jakarta Sans', sans-serif; transition: all .2s;
}
.tab:hover { border-color: var(--teal); color: var(--text); }
.tab.active { background: rgba(45,212,191,0.1); border-color: var(--teal); color: var(--teal); }

/* Arena */
.arena {
  width: 100%; background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: 20px; padding: 40px 36px; position: relative;
  margin-bottom: 32px; min-height: 340px; display: flex; flex-direction: column;
  backdrop-filter: blur(16px);
}
.case-container { display: none; flex: 1; flex-direction: column; justify-content: center; width: 100%; }
.case-container.active { display: flex; }

/* Actor row (handshake / mitm) */
.actor-row { display: flex; align-items: center; gap: 10px; }
.actor { width: 130px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; z-index: 3; }
.actor-icon { width: 62px; height: 62px; border-radius: 50%; border: 2px solid var(--panel-border); display: flex; align-items: center; justify-content: center; background: var(--bg); font-size: 26px; transition: all .35s; }
.actor.active .actor-icon { border-color: var(--teal); box-shadow: 0 0 0 6px rgba(45,212,191,0.14); }
.actor.danger .actor-icon { border-color: var(--red); box-shadow: 0 0 0 6px rgba(248,113,113,0.16); }
.actor.secure .actor-icon { border-color: var(--teal); background: rgba(45,212,191,0.12); }
.actor.blocked .actor-icon { opacity: .35; border-style: dashed; }
.actor-label { font-family: 'Roboto Mono', monospace; font-size: 11.5px; color: var(--text-dim); }
.actor-label b { display: block; color: var(--text); font-size: 13.5px; margin-bottom: 2px; font-family: 'Plus Jakarta Sans', sans-serif; }

.wire-track { flex: 1; position: relative; height: 90px; }
.wire-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--panel-border); }
.packet {
  position: absolute; top: 50%; transform: translate(-50%, -50%); white-space: nowrap;
  font-family: 'Roboto Mono', monospace; font-size: 11px; font-weight: 600; padding: 7px 13px;
  border-radius: 16px; background: var(--bg); border: 1.5px solid var(--panel-border); color: var(--text-dim);
  opacity: 0; z-index: 4; transition: left .6s cubic-bezier(.65,0,.35,1), opacity .3s ease;
}
.packet.show { opacity: 1; }
.packet.plain { border-color: var(--text-faint); color: var(--text-dim); border-style: dashed; }
.packet.gold { border-color: var(--gold); color: var(--gold); }
.packet.teal { border-color: var(--teal); color: var(--teal); }
.packet.locked { border-color: var(--teal); color: #04211d; background: var(--teal); font-weight: 700; }
.packet.danger { border-color: var(--red); color: var(--red); }

.channel-badge {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0;
  font-family: 'Roboto Mono', monospace; font-size: 11.5px; font-weight: 700; color: var(--teal);
  background: rgba(45,212,191,0.12); border: 1.5px solid var(--teal); padding: 7px 16px; border-radius: 18px;
  transition: opacity .4s; white-space: nowrap; z-index: 5;
}
.channel-badge.show { opacity: 1; }

.attacker { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0; transition: opacity .4s; z-index: 6; }
.attacker.show { opacity: 1; }
.attacker-icon { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--red); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.attacker.blocked .attacker-icon { border-color: var(--text-faint); opacity: .5; }
.attacker-label { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--red); }
.attacker.blocked .attacker-label { color: var(--text-faint); }

@media (max-width: 720px) { .actor-row { flex-direction: column; } .wire-track { width: 100%; height: 60px; } }

/* Certificate chain (trust) */
.cert-chain { display: flex; flex-direction: column; align-items: center; gap: 10px; max-width: 440px; margin: 0 auto; width: 100%; }
.cert-card { width: 100%; background: var(--bg); border: 1.5px solid var(--panel-border); border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; transition: all .35s; opacity: .45; }
.cert-card.checking { opacity: 1; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(251,191,36,0.12); }
.cert-card.verified { opacity: 1; border-color: var(--gold); }
.cert-card.anchor { opacity: 1; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(45,212,191,0.14); }
.cert-icon { font-size: 22px; flex-shrink: 0; }
.cert-body { flex: 1; text-align: left; }
.cert-name { font-weight: 700; font-size: 13.5px; color: var(--text); }
.cert-sub { font-family: 'Roboto Mono', monospace; font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }
.cert-check { font-size: 17px; color: var(--gold); opacity: 0; transition: opacity .3s; flex-shrink: 0; }
.cert-card.anchor .cert-check { color: var(--teal); }
.cert-card.verified .cert-check, .cert-card.anchor .cert-check { opacity: 1; }
.chain-arrow { font-family: 'Roboto Mono', monospace; font-size: 10.5px; color: var(--text-faint); }
.trust-result { margin-top: 14px; font-family: 'Roboto Mono', monospace; font-size: 12px; font-weight: 700; padding: 7px 16px; border-radius: 18px; opacity: 0; transition: opacity .4s; background: rgba(45,212,191,0.12); border: 1.5px solid var(--teal); color: var(--teal); }
.trust-result.show { opacity: 1; }

/* Round-trip compare (versions) */
.rt-compare { width: 100%; }
.rt-lane { margin-bottom: 24px; }
.rt-lane-label { font-family: 'Roboto Mono', monospace; font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 10px; }
.rt-track { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; row-gap: 10px; }
.rt-msg { background: var(--bg); border: 1.5px solid var(--panel-border); border-radius: 8px; padding: 8px 12px; font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.rt-msg.client { border-color: var(--teal); color: var(--teal); }
.rt-msg.server { border-color: var(--gold); color: var(--gold); }
.rt-msg.guess { border-style: dashed; }
.rt-divider { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--text-faint); padding: 4px 10px; border-left: 2px dashed var(--panel-border); border-right: 2px dashed var(--panel-border); }
.rt-badge { display: inline-block; margin-top: 10px; font-family: 'Roboto Mono', monospace; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 14px; }
.rt-badge.slow { background: rgba(96,165,250,0.14); color: var(--blue); border: 1px solid var(--blue); }
.rt-badge.fast { background: rgba(167,139,250,0.14); color: var(--violet); border: 1px solid var(--violet); }

/* Player Controls */
.controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: auto; padding-top: 34px; flex-wrap: wrap; }
button.control-btn { background: var(--bg); border: 1.5px solid var(--panel-border); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 13.5px; padding: 11px 22px; border-radius: 30px; cursor: pointer; transition: all .2s; }
button.control-btn:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }
button.control-btn:disabled { opacity: .35; cursor: not-allowed; }
button.control-btn.primary { background: var(--teal); border-color: var(--teal); color: #04211d; box-shadow: 0 5px 15px rgba(45,212,191,0.25); }
button.control-btn.primary:hover:not(:disabled) { background: #5eead4; color: #04211d; }

.timeline { display: flex; gap: 8px; margin: 0 6px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--panel-border); transition: all .3s; }
.dot.done { background: var(--gold); }
.dot.now { background: var(--teal); box-shadow: 0 0 0 4px rgba(45,212,191,0.18); transform: scale(1.2); }

/* Story panel */
.story-panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 16px; padding: 28px 30px; backdrop-filter: blur(16px); }
.tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-family: 'Roboto Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .03em; margin-bottom: 14px; background: rgba(45,212,191,0.1); color: var(--teal); }
.story-title { font-size: 22px; font-weight: 700; margin: 0 0 10px; color: var(--text); }
.story-desc { font-size: 15px; color: var(--text-dim); line-height: 1.7; margin: 0 0 22px; }

.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
.data-card { background: var(--bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 14px 15px; }
.data-label { font-family: 'Roboto Mono', monospace; font-size: 10.5px; color: var(--text-faint); margin-bottom: 5px; letter-spacing: .02em; }
.data-val { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.5; }

.loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: 'Roboto Mono', monospace; color: var(--teal); z-index: 100; transition: opacity .5s; }
</style>
</head>
<body>

<div class="loading" id="loadingNote">ESTABLISHING SECURE CHANNEL...</div>

<div class="wrap" id="wrap" style="opacity:0; transition: opacity 1s;">
  <header>
    <div class="header-text">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="h1"></h1>
      <p class="lede" id="lede"></p>
    </div>
    <div class="lang-switch" id="langSwitch"></div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" onclick="setCase('handshake')" id="tab-handshake"></div>
    <div class="tab" onclick="setCase('trust')" id="tab-trust"></div>
    <div class="tab" onclick="setCase('versions')" id="tab-versions"></div>
    <div class="tab" onclick="setCase('mitm')" id="tab-mitm"></div>
  </div>

  <div class="arena">
    <!-- HANDSHAKE -->
    <div class="case-container" id="c-handshake">
      <div class="actor-row">
        <div class="actor" id="hs-client">
          <div class="actor-icon">💻</div>
          <div class="actor-label"><b>Client</b>Browser</div>
        </div>
        <div class="wire-track">
          <div class="wire-line"></div>
          <div class="packet" id="hs-packet"></div>
          <div class="channel-badge" id="hs-channel">🔒 TLS</div>
        </div>
        <div class="actor" id="hs-server">
          <div class="actor-icon">🖥️</div>
          <div class="actor-label"><b>Server</b>example.com</div>
        </div>
      </div>
    </div>

    <!-- TRUST -->
    <div class="case-container" id="c-trust">
      <div class="cert-chain" id="trust-chain"></div>
    </div>

    <!-- VERSIONS -->
    <div class="case-container" id="c-versions">
      <div class="rt-compare" id="rt-compare"></div>
    </div>

    <!-- MITM -->
    <div class="case-container" id="c-mitm">
      <div class="actor-row">
        <div class="actor" id="mitm-client">
          <div class="actor-icon">💻</div>
          <div class="actor-label"><b>Client</b>Browser</div>
        </div>
        <div class="wire-track">
          <div class="wire-line"></div>
          <div class="attacker" id="mitm-attacker">
            <div class="attacker-icon">🕵️</div>
            <div class="attacker-label">Attacker</div>
          </div>
          <div class="packet" id="mitm-packet"></div>
        </div>
        <div class="actor" id="mitm-server">
          <div class="actor-icon">🖥️</div>
          <div class="actor-label"><b>Server</b>example.com</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="btnPrev"></button>
      <div class="timeline" id="stepTrack"></div>
      <button class="control-btn primary" id="btnNext"></button>
      <button class="control-btn" id="btnReset" style="margin-left: 10px;"></button>
    </div>
  </div>

  <div class="story-panel">
    <span class="tag" id="tag"></span>
    <h2 class="story-title" id="storyTitle"></h2>
    <p class="story-desc" id="storyDesc"></p>
    <div class="data-grid" id="dataGrid"></div>
  </div>
</div>

<script>
const LANGS = ['id', 'en'];
let currentLang = new URLSearchParams(window.location.search).get('lang') || localStorage.getItem('lang') || 'en';
let i18n = null;
let currentCase = 'handshake';
let currentStep = 0;

async function loadData() {
  const res = await fetch(`i18n/https-tls.${currentLang}.json`);
  i18n = await res.json();
}

function updateStaticUI() {
  document.documentElement.lang = currentLang;
  document.title = i18n.documentTitle;
  document.getElementById('eyebrow').textContent = i18n.eyebrow;
  document.getElementById('h1').innerHTML = i18n.h1Prefix + `<span>${i18n.h1Highlight}</span>` + i18n.h1Suffix;
  document.getElementById('lede').textContent = i18n.lede;

  document.getElementById('tab-handshake').textContent = i18n.cases.handshake;
  document.getElementById('tab-trust').textContent = i18n.cases.trust;
  document.getElementById('tab-versions').textContent = i18n.cases.versions;
  document.getElementById('tab-mitm').textContent = i18n.cases.mitm;

  document.getElementById('btnPrev').innerHTML = i18n.controls.prev;
  document.getElementById('btnReset').innerHTML = i18n.controls.reset;

  const ls = document.getElementById('langSwitch');
  ls.innerHTML = '';
  LANGS.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lang-btn' + (l === currentLang ? ' active' : '');
    b.innerText = l.toUpperCase();
    b.onclick = () => setLang(l);
    ls.appendChild(b);
  });
}

/* ---------- shared actor-row helpers (handshake / mitm) ---------- */
function setActor(id, state) {
  document.getElementById(id).className = 'actor' + (state ? ' ' + state : '');
}
function setPacket(id, opts) {
  const el = document.getElementById(id);
  if (!opts || !opts.show) { el.className = 'packet'; return; }
  el.className = 'packet show' + (opts.cls ? ' ' + opts.cls : '');
  el.style.left = opts.pos + '%';
  el.textContent = opts.label;
}

/* ---------- HANDSHAKE ---------- */
function resetHandshake() {
  setActor('hs-client', ''); setActor('hs-server', '');
  setPacket('hs-packet', null);
  document.getElementById('hs-channel').classList.remove('show');
}
function renderHandshake(step) {
  document.getElementById('hs-channel').classList.remove('show');
  if (step === 0) { setActor('hs-client', ''); setActor('hs-server', ''); setPacket('hs-packet', null); }
  if (step === 1) { setActor('hs-client', 'active'); setActor('hs-server', ''); setPacket('hs-packet', { show: true, pos: 80, label: 'ClientHello', cls: 'plain' }); }
  if (step === 2) { setActor('hs-client', ''); setActor('hs-server', 'active'); setPacket('hs-packet', { show: true, pos: 20, label: 'ServerHello + Cert', cls: 'gold' }); }
  if (step === 3) { setActor('hs-client', 'active'); setActor('hs-server', ''); setPacket('hs-packet', null); }
  if (step === 4) { setActor('hs-client', 'active'); setActor('hs-server', 'active'); setPacket('hs-packet', { show: true, pos: 50, label: 'Key Share ⇄', cls: 'teal' }); }
  if (step === 5) { setActor('hs-client', 'active'); setActor('hs-server', 'active'); setPacket('hs-packet', null); }
  if (step === 6) { setActor('hs-client', 'active'); setActor('hs-server', 'active'); setPacket('hs-packet', { show: true, pos: 50, label: 'Finished ⇄', cls: 'locked' }); }
  if (step === 7) { setActor('hs-client', 'secure'); setActor('hs-server', 'secure'); setPacket('hs-packet', null); document.getElementById('hs-channel').classList.add('show'); }
}

/* ---------- TRUST (certificate chain) ---------- */
function certCard(name, sub, cls) {
  return `<div class="cert-card ${cls}"><span class="cert-icon">📜</span><div class="cert-body"><div class="cert-name">${name}</div><div class="cert-sub">${sub}</div></div><span class="cert-check">✓</span></div>`;
}
function resetTrust() { document.getElementById('trust-chain').innerHTML = ''; }
function renderTrust(step) {
  const serverCls = step >= 2 ? 'verified' : (step >= 1 ? 'checking' : '');
  const interCls = step >= 3 ? 'verified' : (step === 2 ? 'checking' : '');
  const rootCls = step >= 4 ? 'anchor' : (step === 3 ? 'checking' : '');
  const html =
    certCard('example.com', 'Server Certificate', serverCls) +
    '<div class="chain-arrow">↑ signed by</div>' +
    certCard('Intermediate CA', 'Certificate Authority', interCls) +
    '<div class="chain-arrow">↑ signed by</div>' +
    certCard('Root CA', 'Self-signed · in the trust store', rootCls) +
    `<div class="trust-result${step >= 5 ? ' show' : ''}">🔒</div>`;
  document.getElementById('trust-chain').innerHTML = html;
}

/* ---------- VERSIONS (round-trip compare) ---------- */
function rtMsg(label, cls) { return `<div class="rt-msg ${cls || ''}">${label}</div>`; }
function rtDivider(label) { return `<div class="rt-divider">${label}</div>`; }
function rtLane(title, track, badge) {
  return `<div class="rt-lane"><div class="rt-lane-label">${title}</div><div class="rt-track">${track}</div>` +
    (badge ? `<div class="rt-badge ${badge.cls}">${badge.text}</div>` : '') + `</div>`;
}
function resetVersions() { document.getElementById('rt-compare').innerHTML = ''; }
function renderVersions(step) {
  const el = document.getElementById('rt-compare');
  let lane12Track = rtMsg('ClientHello →', 'client');
  let lane12Badge = null;
  if (step >= 1) {
    lane12Track += rtMsg('← ServerHello + Cert + Params', 'server') + rtDivider('Round-trip 1');
  }
  if (step >= 2) {
    lane12Track += rtMsg('KeyExchange + Finished →', 'client') + rtMsg('← Finished', 'server') + rtDivider('Round-trip 2');
    lane12Badge = { cls: 'slow', text: i18n.labels.totalRoundTripsSlow };
  }

  let lane13Track = rtMsg('ClientHello + key share →', 'client' + (step === 3 ? ' guess' : ''));
  let lane13Badge = null;
  if (step >= 4) {
    lane13Track += rtMsg('← ServerHello + Cert + KeyShare + Finished', 'server') + rtMsg('Finished →', 'client') + rtDivider('Round-trip 1');
    lane13Badge = { cls: 'fast', text: i18n.labels.totalRoundTripsFast };
  }

  let html = rtLane('TLS 1.2', lane12Track, lane12Badge) + rtLane('TLS 1.3', lane13Track, lane13Badge);

  if (step >= 5) {
    html += rtLane(i18n.labels.returnVisitLane, rtMsg('ClientHello + Encrypted Data →', 'client'), { cls: 'fast', text: i18n.labels.zeroRtt });
  }

  el.innerHTML = html;
}

/* ---------- MITM ---------- */
function resetMitm() {
  setActor('mitm-client', ''); setActor('mitm-server', '');
  setPacket('mitm-packet', null);
  document.getElementById('mitm-attacker').className = 'attacker';
}
function renderMitm(step) {
  const attacker = document.getElementById('mitm-attacker');
  if (step === 0) {
    setActor('mitm-client', 'active'); setActor('mitm-server', '');
    attacker.className = 'attacker';
    setPacket('mitm-packet', null);
  }
  if (step === 1) {
    setActor('mitm-client', ''); setActor('mitm-server', '');
    attacker.className = 'attacker show';
    setPacket('mitm-packet', null);
  }
  if (step === 2) {
    setActor('mitm-client', 'active'); setActor('mitm-server', '');
    attacker.className = 'attacker show danger';
    setPacket('mitm-packet', { show: true, pos: 50, label: '👁 user / pass', cls: 'plain danger' });
  }
  if (step === 3) {
    setActor('mitm-client', ''); setActor('mitm-server', '');
    attacker.className = 'attacker show danger';
    setPacket('mitm-packet', { show: true, pos: 50, label: i18n.labels.injectedScript, cls: 'plain danger' });
  }
  if (step === 4) {
    setActor('mitm-client', 'active'); setActor('mitm-server', '');
    attacker.className = 'attacker show blocked';
    setPacket('mitm-packet', { show: true, pos: 50, label: i18n.labels.encryptedLabel, cls: 'locked' });
  }
  if (step === 5) {
    setActor('mitm-client', 'secure'); setActor('mitm-server', 'secure');
    attacker.className = 'attacker show blocked';
    setPacket('mitm-packet', { show: true, pos: 50, label: i18n.labels.unreadableLabel, cls: 'locked' });
  }
}

/* ---------- generic step render ---------- */
const RENDERERS = { handshake: renderHandshake, trust: renderTrust, versions: renderVersions, mitm: renderMitm };
const RESETTERS = { handshake: resetHandshake, trust: resetTrust, versions: resetVersions, mitm: resetMitm };

function setCase(c) {
  currentCase = c;
  currentStep = 0;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${c}`).classList.add('active');

  document.querySelectorAll('.case-container').forEach(cc => cc.classList.remove('active'));
  document.getElementById(`c-${c}`).classList.add('active');

  RESETTERS[c]();
  renderStep();
}

function renderStep() {
  const steps = i18n.steps[currentCase];
  const data = steps[currentStep];

  RENDERERS[currentCase](currentStep);

  document.getElementById('tag').textContent = data.tag;
  document.getElementById('storyTitle').textContent = data.title;
  document.getElementById('storyDesc').textContent = data.desc;

  const grid = document.getElementById('dataGrid');
  grid.innerHTML = '';
  data.fields.forEach(([lbl, val]) => {
    grid.innerHTML += `<div class="data-card"><div class="data-label">${lbl}</div><div class="data-val">${val}</div></div>`;
  });

  const track = document.getElementById('stepTrack');
  track.innerHTML = '';
  for (let i = 0; i < steps.length; i++) {
    let cls = 'dot';
    if (i < currentStep) cls += ' done';
    if (i === currentStep) cls += ' now';
    track.innerHTML += `<div class="${cls}"></div>`;
  }

  document.getElementById('btnPrev').disabled = (currentStep === 0);
  document.getElementById('btnNext').innerHTML = (currentStep === steps.length - 1) ? i18n.controls.done : i18n.controls.next;
}

document.getElementById('btnNext').onclick = () => { const len = i18n.steps[currentCase].length; if (currentStep < len - 1) { currentStep++; renderStep(); } };
document.getElementById('btnPrev').onclick = () => { if (currentStep > 0) { currentStep--; renderStep(); } };
document.getElementById('btnReset').onclick = () => { currentStep = 0; renderStep(); };

async function setLang(l) {
  if (l === currentLang) return;
  currentLang = l;
  localStorage.setItem('lang', l);
  const u = new URL(window.location);
  u.searchParams.set('lang', l);
  history.replaceState(null, '', u);

  await loadData();
  updateStaticUI();
  renderStep();

  if (window.parent !== window) {
    window.parent.postMessage({ type: 'howitworks:lang-change', lang: l }, '*');
  }
}

async function init() {
  await loadData();
  updateStaticUI();
  setCase('handshake');

  document.getElementById('loadingNote').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loadingNote').style.display = 'none';
    document.getElementById('wrap').style.opacity = '1';
  }, 500);
}

init();
</script>
