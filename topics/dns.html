<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DNS: The Phonebook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg-dark: #070710;
  --bg-card: rgba(20, 20, 35, 0.7);
  --text-main: #f0f0f5;
  --text-muted: #8b8b9e;
  
  --color-browser: #00f0ff;
  --color-resolver: #b026ff;
  --color-root: #ffaa00;
  --color-tld: #ff3366;
  --color-auth: #00ff66;

  --glass-border: rgba(255, 255, 255, 0.1);
  --glass-bg: rgba(255, 255, 255, 0.03);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow-x: hidden; }

body {
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(circle at 50% 0%, rgba(176, 38, 255, 0.1) 0%, transparent 50%),
    linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
  background-size: 100% 100%, 20px 20px, 20px 20px;
  color: var(--text-main);
  font-family: 'Outfit', sans-serif;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.wrap { max-width: 1200px; width: 100%; }

/* Header & Controls */
header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; position: relative; z-index: 10; }
.header-text { max-width: 650px; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--color-browser);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: inline-block;
  padding: 4px 10px; background: rgba(0, 240, 255, 0.1); border-radius: 4px;
}
h1 {
  font-size: clamp(32px, 4vw, 48px); font-weight: 800; margin: 10px 0; line-height: 1.1;
  background: linear-gradient(90deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
h1 span {
  background: linear-gradient(90deg, var(--color-browser), var(--color-resolver)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.lede { font-size: 17px; color: var(--text-muted); line-height: 1.6; font-weight: 300; }

/* Language Switch */
.lang-switch {
  display: flex; background: var(--bg-card); border: 1px solid var(--glass-border);
  border-radius: 8px; backdrop-filter: blur(10px); overflow: hidden;
}
.lang-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; background: transparent; border: none;
  color: var(--text-muted); padding: 8px 16px; cursor: pointer; transition: all 0.3s ease;
}
.lang-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
.lang-btn.active {
  background: rgba(255,255,255,0.1); color: #fff; font-weight: 700; box-shadow: inset 0 -2px 0 var(--color-browser);
}

/* Simulation Arena */
.arena {
  width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 20px; padding: 40px; position: relative; backdrop-filter: blur(20px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 40px;
}

.network-graph {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: repeat(3, 1fr);
  gap: 20px;
  min-height: 400px;
  position: relative;
  align-items: center;
  justify-items: center;
}

/* Connection Lines (SVG) */
.lines {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.line {
  fill: none;
  stroke: rgba(255,255,255,0.1);
  stroke-width: 2;
  transition: all 0.5s;
}
.line.active {
  stroke-dasharray: 10;
  animation: march 1s linear infinite;
}
@keyframes march { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

/* Nodes */
.node {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  z-index: 1;
  width: 180px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.node-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; margin-bottom: 5px; }
.node-ip { font-size: 11px; color: var(--text-muted); font-family: monospace; }
.node-icon { font-size: 32px; margin-bottom: 10px; display: block; }

/* Grid Positioning */
.n-browser { grid-column: 1; grid-row: 2; }
.n-resolver { grid-column: 2; grid-row: 2; }
.n-root { grid-column: 3; grid-row: 1; }
.n-tld { grid-column: 3; grid-row: 2; }
.n-auth { grid-column: 3; grid-row: 3; }

/* Node Specific Colors & States */
.n-browser { border-color: var(--color-browser); }
.n-browser.active { box-shadow: 0 0 30px rgba(0,240,255,0.4); transform: scale(1.05); }

.n-resolver { border-color: var(--color-resolver); }
.n-resolver.active { box-shadow: 0 0 30px rgba(176,38,255,0.4); transform: scale(1.05); }

.n-root { border-color: var(--color-root); opacity: 0.5; }
.n-root.active { opacity: 1; box-shadow: 0 0 30px rgba(255,170,0,0.4); transform: scale(1.05); }

.n-tld { border-color: var(--color-tld); opacity: 0.5; }
.n-tld.active { opacity: 1; box-shadow: 0 0 30px rgba(255,51,102,0.4); transform: scale(1.05); }

.n-auth { border-color: var(--color-auth); opacity: 0.5; }
.n-auth.active { opacity: 1; box-shadow: 0 0 30px rgba(0,255,102,0.4); transform: scale(1.05); }

/* Cache badge on Resolver */
.cache-badge {
  display: inline-block; margin-top: 10px; padding: 2px 8px;
  background: var(--color-auth); color: #000; font-family: monospace;
  font-size: 10px; font-weight: bold; border-radius: 4px;
  opacity: 0; transform: translateY(10px); transition: all 0.5s;
}
.cache-badge.visible { opacity: 1; transform: translateY(0); }

/* Message Bubble */
.msg {
  position: absolute;
  top: 10%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.9);
  color: #000;
  padding: 10px 20px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: bold;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 5;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}
.msg.visible { opacity: 1; top: 15%; }

/* Player Controls */
.controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 40px; }
button.control-btn {
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; padding: 12px 24px;
  border-radius: 30px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(5px);
}
button.control-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
button.control-btn:disabled { opacity: 0.3; cursor: not-allowed; }
button.control-btn.primary { background: linear-gradient(45deg, var(--color-browser), var(--color-resolver)); border: none; box-shadow: 0 5px 15px rgba(176,38,255,0.3); }
button.control-btn.primary:hover:not(:disabled) { box-shadow: 0 8px 25px rgba(0,240,255,0.4); }

.timeline { display: flex; gap: 8px; margin: 0 20px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.3s; }
.dot.done { background: var(--color-resolver); }
.dot.now { background: var(--color-browser); box-shadow: 0 0 10px var(--color-browser); transform: scale(1.3); }

/* Story Panel */
.story-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; backdrop-filter: blur(10px); }
.tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; background: rgba(255,255,255,0.1); color: #fff; }
.story-title { font-size: 24px; font-weight: 700; margin: 0 0 10px; color: #fff; }
.story-desc { font-size: 16px; color: var(--text-muted); line-height: 1.6; margin: 0 0 25px; }

.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
.data-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; }
.data-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.data-val { font-size: 15px; font-weight: 600; color: var(--color-browser); }

.loading { position: fixed; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; color: var(--color-browser); z-index: 100; transition: opacity 0.5s; }
</style>
</head>
<body>

<div class="loading" id="loadingNote">RESOLVING DNS...</div>

<div class="wrap" id="wrap" style="opacity:0; transition: opacity 1s;">
  <header>
    <div class="header-text">
      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="h1"></h1>
      <p class="lede" id="lede"></p>
    </div>
    <div class="lang-switch" id="langSwitch"></div>
  </header>

  <div class="arena">
    <div class="msg" id="queryMsg">"Where is example.com?"</div>

    <div class="network-graph" id="graph">
      <svg class="lines">
        <!-- SVG lines drawn via JS to connect nodes accurately -->
        <path id="line-b-res" class="line" d="" stroke="var(--color-resolver)" />
        <path id="line-res-root" class="line" d="" stroke="var(--color-root)" />
        <path id="line-res-tld" class="line" d="" stroke="var(--color-tld)" />
        <path id="line-res-auth" class="line" d="" stroke="var(--color-auth)" />
      </svg>

      <div class="node n-browser" id="n-browser">
        <span class="node-icon">💻</span>
        <div class="node-title">Browser</div>
        <div class="node-ip">192.168.1.5</div>
      </div>

      <div class="node n-resolver" id="n-resolver">
        <span class="node-icon">🏢</span>
        <div class="node-title">DNS Resolver</div>
        <div class="node-ip">8.8.8.8</div>
        <div class="cache-badge" id="cacheBadge">CACHE: 192.0.2.1</div>
      </div>

      <div class="node n-root" id="n-root">
        <span class="node-icon">🌍</span>
        <div class="node-title">Root Server (.)</div>
        <div class="node-ip">198.41.0.4</div>
      </div>

      <div class="node n-tld" id="n-tld">
        <span class="node-icon">📚</span>
        <div class="node-title">TLD Server (.com)</div>
        <div class="node-ip">192.5.6.30</div>
      </div>

      <div class="node n-auth" id="n-auth">
        <span class="node-icon">🎯</span>
        <div class="node-title">Auth Server</div>
        <div class="node-ip">199.43.135.53</div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="btnPrev"></button>
      <div class="timeline" id="stepTrack"></div>
      <button class="control-btn primary" id="btnNext"></button>
      <button class="control-btn" id="btnReset" style="margin-left: 20px;"></button>
    </div>
  </div>

  <div class="story-panel">
    <span class="tag" id="tag"></span>
    <h2 class="story-title" id="storyTitle"></h2>
    <p class="story-desc" id="storyDesc"></p>
    <div class="data-grid" id="dataGrid"></div>
  </div>
</div>

<script>
const LANGS = ['id', 'en'];
let currentLang = new URLSearchParams(window.location.search).get('lang') || localStorage.getItem('lang') || 'en';
let i18n = null;
let current = 0;
const totalSteps = 5;

// SVG Line Drawing Logic
function drawLines() {
  const getCenter = (id) => {
    const el = document.getElementById(id);
    const rect = el.getBoundingClientRect();
    const graphRect = document.getElementById('graph').getBoundingClientRect();
    return {
      x: rect.left - graphRect.left + rect.width / 2,
      y: rect.top - graphRect.top + rect.height / 2
    };
  };

  const drawPath = (id, p1, p2) => {
    const path = document.getElementById(id);
    path.setAttribute('d', `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`);
  };

  const b = getCenter('n-browser');
  const res = getCenter('n-resolver');
  const root = getCenter('n-root');
  const tld = getCenter('n-tld');
  const auth = getCenter('n-auth');

  drawPath('line-b-res', b, res);
  drawPath('line-res-root', res, root);
  drawPath('line-res-tld', res, tld);
  drawPath('line-res-auth', res, auth);
}
window.addEventListener('resize', drawLines);

async function loadData() {
  const res = await fetch(`i18n/dns.${currentLang}.json`);
  i18n = await res.json();
}

function updateStaticUI() {
  document.documentElement.lang = currentLang;
  document.title = i18n.documentTitle;
  document.getElementById('eyebrow').textContent = i18n.eyebrow;
  document.getElementById('h1').innerHTML = i18n.h1Prefix + `<span>${i18n.h1Highlight}</span>` + i18n.h1Suffix;
  document.getElementById('lede').textContent = i18n.lede;
  
  document.getElementById('btnPrev').innerHTML = i18n.controls.prev;
  document.getElementById('btnNext').innerHTML = i18n.controls.next;
  document.getElementById('btnReset').innerHTML = i18n.controls.reset;

  const ls = document.getElementById('langSwitch');
  ls.innerHTML = '';
  LANGS.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lang-btn' + (l === currentLang ? ' active' : '');
    b.innerText = l.toUpperCase();
    b.onclick = () => setLang(l);
    ls.appendChild(b);
  });
}

function renderStep() {
  const data = i18n.steps[current];

  // Reset node states
  const nodes = ['browser', 'resolver', 'root', 'tld', 'auth'];
  nodes.forEach(n => document.getElementById(`n-${n}`).classList.remove('active'));
  
  // Reset lines
  document.querySelectorAll('.line').forEach(l => l.classList.remove('active'));
  
  // Hide badge
  document.getElementById('cacheBadge').classList.remove('visible');

  // Popup Msg
  const msg = document.getElementById('queryMsg');
  msg.classList.remove('visible');
  
  // Apply logic per step
  setTimeout(() => {
    msg.textContent = `"${data.fields[0][1]}"`; // Display the query/reply as a popup
    msg.classList.add('visible');

    if (current === 0) {
      document.getElementById('n-browser').classList.add('active');
      document.getElementById('n-resolver').classList.add('active');
      document.getElementById('line-b-res').classList.add('active');
    }
    else if (current === 1) {
      document.getElementById('n-resolver').classList.add('active');
      document.getElementById('n-root').classList.add('active');
      document.getElementById('line-res-root').classList.add('active');
    }
    else if (current === 2) {
      document.getElementById('n-resolver').classList.add('active');
      document.getElementById('n-tld').classList.add('active');
      document.getElementById('line-res-tld').classList.add('active');
    }
    else if (current === 3) {
      document.getElementById('n-resolver').classList.add('active');
      document.getElementById('n-auth').classList.add('active');
      document.getElementById('line-res-auth').classList.add('active');
    }
    else if (current === 4) {
      document.getElementById('n-browser').classList.add('active');
      document.getElementById('n-resolver').classList.add('active');
      document.getElementById('line-b-res').classList.add('active');
      document.getElementById('cacheBadge').classList.add('visible');
    }
  }, 50);

  // Update Text
  document.getElementById('tag').textContent = data.tag;
  document.getElementById('storyTitle').textContent = data.title;
  document.getElementById('storyDesc').textContent = data.desc;

  const grid = document.getElementById('dataGrid');
  grid.innerHTML = '';
  data.fields.forEach(([lbl, val]) => {
    grid.innerHTML += `<div class="data-card"><div class="data-label">${lbl}</div><div class="data-val">${val}</div></div>`;
  });

  // Controls & Dots
  const track = document.getElementById('stepTrack');
  track.innerHTML = '';
  for(let i=0; i<totalSteps; i++){
    let cls = 'dot';
    if(i < current) cls += ' done';
    if(i === current) cls += ' now';
    track.innerHTML += `<div class="${cls}"></div>`;
  }

  document.getElementById('btnPrev').disabled = (current === 0);
  document.getElementById('btnNext').innerHTML = (current === totalSteps - 1) ? i18n.controls.done : i18n.controls.next;
}

document.getElementById('btnNext').onclick = () => { if(current < totalSteps - 1) { current++; renderStep(); } };
document.getElementById('btnPrev').onclick = () => { if(current > 0) { current--; renderStep(); } };
document.getElementById('btnReset').onclick = () => { current = 0; renderStep(); };

async function setLang(l) {
  if (l === currentLang) return;
  currentLang = l;
  localStorage.setItem('lang', l);
  const u = new URL(window.location);
  u.searchParams.set('lang', l);
  history.replaceState(null, '', u);
  
  await loadData();
  updateStaticUI();
  renderStep();
  
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'howitworks:lang-change', lang: l }, '*');
  }
}

async function init() {
  await loadData();
  updateStaticUI();
  
  // Need to ensure fonts and layout are done before drawing lines
  setTimeout(() => {
    drawLines();
    renderStep();
    document.getElementById('loadingNote').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loadingNote').style.display = 'none';
      document.getElementById('wrap').style.opacity = '1';
    }, 500);
  }, 300);
}

init();
</script>
</body>
</html>
