<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LLM: How Large Language Models Think</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a14;
  --bg-card:rgba(20,18,40,0.85);
  --surface:rgba(30,28,60,0.6);
  --border:rgba(120,100,255,0.15);
  --border-active:rgba(120,100,255,0.5);
  --text:#e8e6f0;
  --text-muted:#8b87a8;
  --text-faint:#5a567a;
  --accent:#7c5cff;
  --accent-glow:rgba(124,92,255,0.4);
  --neon-pink:#ff4da6;
  --neon-cyan:#00e5ff;
  --neon-green:#39ff85;
  --neon-orange:#ff9f43;
  --glass:rgba(255,255,255,0.04);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(124,92,255,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(255,77,166,0.08) 0%,transparent 50%);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  padding:32px 20px 80px;
}

.wrap{max-width:1100px;margin:0 auto;}

header{margin-bottom:28px;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--neon-cyan);
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--neon-cyan);display:inline-block;}

.lang-switch{
  display:flex;flex-shrink:0;
  border:1px solid var(--border);
  border-radius:5px;overflow:hidden;
}
.lang-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:0.04em;
  background:transparent;border:none;
  color:var(--text-muted);padding:6px 11px;
  cursor:pointer;transition:background .15s,color .15s;
}
.lang-btn+.lang-btn{border-left:1px solid var(--border);}
.lang-btn:hover{color:var(--text);}
.lang-btn.active{background:var(--accent);color:#fff;font-weight:600;}

h1{
  font-weight:700;
  font-size:clamp(28px,4.2vw,44px);
  line-height:1.08;margin:12px 0 14px;
  letter-spacing:-0.01em;
}
h1 span{color:var(--neon-pink);}
.lede{
  font-size:16px;line-height:1.6;
  color:var(--text-muted);max-width:640px;
}

/* ===== TABS ===== */
.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab{
  background:var(--bg-card);
  border:1px solid var(--border);
  color:var(--text-muted);
  padding:10px 18px;border-radius:8px;
  cursor:pointer;font-weight:600;font-size:13.5px;
  font-family:'Space Grotesk',sans-serif;
  transition:all 0.2s;
}
.tab:hover{background:rgba(255,255,255,0.06);color:var(--text);}
.tab.active{background:rgba(124,92,255,0.14);border-color:var(--accent);color:#c3b3ff;}

/* ===== PIPELINE / ARENA STAGE ===== */
.pipeline{
  position:relative;
  border:1px solid var(--border);
  border-radius:16px;
  background:var(--bg-card);
  padding:28px 24px 20px;
  margin-bottom:22px;
  overflow:hidden;
}
.pipeline::after{
  content:"";
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--neon-pink),var(--neon-cyan));
}

.pipeline-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--text-faint);
  margin-bottom:20px;
  min-height:14px;
}

.case-container{display:none;}
.case-container.active{display:block;}

/* Flow Container (pipeline case) */
.flow{
  display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap;
  min-height:180px;
  position:relative;
}

.flow-node{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px 18px;
  text-align:center;
  min-width:130px;
  transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  position:relative;
}
.flow-node.active{
  border-color:var(--accent);
  box-shadow:0 0 24px var(--accent-glow);
  transform:scale(1.06);
}
.flow-node .icon{font-size:28px;margin-bottom:6px;display:block;}
.flow-node .label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-muted);
}
.flow-node .sublabel{
  font-size:12px;color:var(--text-faint);margin-top:4px;
}

.flow-arrow{
  color:var(--text-faint);
  font-size:20px;
  flex-shrink:0;
  transition:color 0.3s;
}
.flow-arrow.active{color:var(--accent);}

/* Token Grid (tokenization step) */
.token-grid{
  display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;
  margin-top:16px;
  min-height:60px;
}
.token-chip{
  background:rgba(124,92,255,0.15);
  border:1px solid rgba(124,92,255,0.3);
  border-radius:8px;
  padding:8px 14px;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;font-weight:500;
  color:var(--text);
  opacity:0;transform:translateY(8px);
  transition:all 0.3s;
}
.token-chip.show{opacity:1;transform:translateY(0);}
.token-chip .tok-id{
  display:block;font-size:9px;color:var(--text-faint);
  margin-top:2px;
}

/* Embedding Vectors */
.vector-display{
  display:flex;gap:10px;flex-wrap:wrap;
  justify-content:center;margin-top:16px;
}
.vector-bar{
  width:40px;height:80px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  position:relative;overflow:hidden;
  opacity:0;transform:scale(0.8);
  transition:all 0.4s;
}
.vector-bar.show{opacity:1;transform:scale(1);}
.vector-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--accent),var(--neon-pink));
  border-radius:0 0 5px 5px;
  transition:height 0.6s ease-out;
}
.vector-label{
  position:absolute;bottom:-18px;left:50%;
  transform:translateX(-50%);
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--text-faint);
  white-space:nowrap;
}

/* Prediction Output */
.prediction-output{
  text-align:center;margin-top:16px;
}
.pred-token{
  display:inline-block;
  background:linear-gradient(135deg,var(--accent),var(--neon-pink));
  border-radius:20px;
  padding:10px 24px;
  font-family:'IBM Plex Mono',monospace;
  font-size:18px;font-weight:700;
  color:#fff;
  opacity:0;transform:scale(0.7);
  transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
.pred-token.show{opacity:1;transform:scale(1);}

/* ===== AUTOREGRESSIVE ===== */
.gen-strip{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;font-family:'IBM Plex Mono',monospace;font-size:15px;
  color:var(--text);text-align:center;margin-bottom:20px;min-height:24px;
}
.gen-strip .new-tok{color:var(--neon-pink);font-weight:700;}
.cand-list{display:flex;flex-direction:column;gap:9px;max-width:380px;margin:0 auto;}
.cand-row{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
.cand-tok{width:80px;text-align:right;color:var(--text-muted);flex-shrink:0;}
.cand-row.winner .cand-tok{color:var(--neon-green);font-weight:700;}
.cand-bar-track{flex:1;height:14px;background:rgba(255,255,255,0.05);border-radius:7px;overflow:hidden;}
.cand-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--neon-pink));border-radius:7px;transition:width .5s;}
.cand-row.winner .cand-bar-fill{background:linear-gradient(90deg,var(--neon-green),#39ff85);}
.cand-pct{width:36px;font-size:11px;color:var(--text-faint);flex-shrink:0;}
.temp-compare{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
.temp-col{flex:1;min-width:220px;}
.temp-col-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}

/* ===== TRAINING ===== */
.corpus-line{font-family:'IBM Plex Mono',monospace;font-size:15px;text-align:center;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px;}
.corpus-line .blank{color:var(--neon-orange);font-weight:700;}
.guess-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.guess-chip{padding:10px 20px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;}
.guess-chip.wrong{background:rgba(255,77,166,0.15);border:1px solid var(--neon-pink);color:var(--neon-pink);}
.guess-chip.correct{background:rgba(57,255,133,0.15);border:1px solid var(--neon-green);color:var(--neon-green);}
.loss-meter{max-width:320px;margin:0 auto 18px;}
.capacity-label{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);margin-bottom:6px;}
.loss-track{height:14px;background:rgba(255,255,255,0.05);border-radius:7px;overflow:hidden;}
.loss-fill{height:100%;background:linear-gradient(90deg,var(--neon-orange),var(--neon-pink));border-radius:7px;transition:width .6s;}
.weight-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;max-width:340px;margin:0 auto;}
.weight-cell{aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,0.06);transition:all .4s;}
.weight-cell.adjusted{background:var(--accent);box-shadow:0 0 8px var(--accent-glow);}

/* ===== CONTEXT WINDOW ===== */
.capacity-box{max-width:440px;margin:10px auto 0;}
.capacity-track{height:22px;background:rgba(255,255,255,0.05);border-radius:11px;overflow:hidden;border:1px solid var(--border);}
.capacity-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--neon-cyan));border-radius:11px;transition:width .5s;}
.capacity-fill.overflow{background:linear-gradient(90deg,var(--neon-orange),var(--neon-pink));}

/* ===== HALLUCINATION ===== */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--text);text-align:center;margin-bottom:16px;}
.answer-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px 22px;text-align:center;margin-bottom:16px;}
.answer-card.fake{border-color:var(--neon-pink);}
.fake-badge{display:inline-block;margin-top:10px;padding:4px 12px;border-radius:12px;background:rgba(255,77,166,0.15);border:1px solid var(--neon-pink);color:var(--neon-pink);font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;}
.mitigation-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.mitigation-chip{padding:8px 16px;border-radius:16px;background:rgba(0,229,255,0.1);border:1px solid var(--neon-cyan);color:var(--neon-cyan);font-family:'IBM Plex Mono',monospace;font-size:12px;}

/* Story Panel */
.story-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;padding:30px;
}
.tag{
  display:inline-block;padding:4px 12px;
  border-radius:20px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;font-weight:700;
  margin-bottom:15px;text-transform:uppercase;
  letter-spacing:1px;
  background:rgba(124,92,255,0.15);color:var(--accent);
}
.story-title{font-size:24px;font-weight:700;margin:0 0 10px;color:var(--text);}
.story-desc{font-size:16px;color:var(--text-muted);line-height:1.6;margin:0 0 25px;}

.data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.data-card{
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:8px;padding:15px;
}
.data-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--text-muted);margin-bottom:5px;
}
.data-val{font-size:15px;font-weight:600;color:var(--neon-cyan);}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:15px;margin-top:30px;flex-wrap:wrap;}
button.ctrl-btn{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  font-weight:600;font-size:14px;
  padding:12px 24px;border-radius:30px;
  cursor:pointer;transition:all 0.2s;
}
button.ctrl-btn:hover:not(:disabled){
  background:rgba(255,255,255,0.1);
  border-color:var(--border-active);
  transform:translateY(-2px);
}
button.ctrl-btn:disabled{opacity:0.3;cursor:not-allowed;}
button.ctrl-btn.primary{
  background:linear-gradient(135deg,var(--accent),var(--neon-pink));
  border:none;
  box-shadow:0 5px 15px var(--accent-glow);
}
button.ctrl-btn.primary:hover:not(:disabled){
  box-shadow:0 8px 25px var(--accent-glow);
}

.timeline{display:flex;gap:8px;margin:0 20px;}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,0.1);transition:all 0.3s;
}
.dot.done{background:var(--accent);}
.dot.now{background:var(--neon-pink);box-shadow:0 0 10px var(--neon-pink);transform:scale(1.3);}

/* Loading */
.loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;color:var(--accent);
  z-index:100;transition:opacity 0.5s;
}
</style>
</head>
<body>

<div class="loading" id="loadingNote">LOADING MODEL...</div>

<div class="wrap" id="wrap" style="opacity:0;transition:opacity 1s;">
  <header>
    <div class="header-top">
      <div>
        <div class="eyebrow" id="eyebrow"></div>
        <h1 id="h1"></h1>
        <p class="lede" id="lede"></p>
      </div>
      <div class="lang-switch" id="langSwitch"></div>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" onclick="setCase('pipeline')" id="tab-pipeline"></div>
    <div class="tab" onclick="setCase('autoregressive')" id="tab-autoregressive"></div>
    <div class="tab" onclick="setCase('training')" id="tab-training"></div>
    <div class="tab" onclick="setCase('context')" id="tab-context"></div>
    <div class="tab" onclick="setCase('hallucination')" id="tab-hallucination"></div>
  </div>

  <div class="pipeline">
    <div class="pipeline-label" id="pipelineLabel"></div>

    <!-- PIPELINE -->
    <div class="case-container active" id="c-pipeline">
      <div class="flow" id="flow">
        <div class="flow-node" id="fn-input">
          <span class="icon">💬</span>
          <div class="label" id="fl-input"></div>
          <div class="sublabel" id="fsl-input"></div>
        </div>
        <div class="flow-arrow" id="fa-1">→</div>
        <div class="flow-node" id="fn-tokenize">
          <span class="icon">✂️</span>
          <div class="label" id="fl-tokenize"></div>
          <div class="sublabel" id="fsl-tokenize"></div>
        </div>
        <div class="flow-arrow" id="fa-2">→</div>
        <div class="flow-node" id="fn-embed">
          <span class="icon">📊</span>
          <div class="label" id="fl-embed"></div>
          <div class="sublabel" id="fsl-embed"></div>
        </div>
        <div class="flow-arrow" id="fa-3">→</div>
        <div class="flow-node" id="fn-attention">
          <span class="icon">🧠</span>
          <div class="label" id="fl-attention"></div>
          <div class="sublabel" id="fsl-attention"></div>
        </div>
        <div class="flow-arrow" id="fa-4">→</div>
        <div class="flow-node" id="fn-output">
          <span class="icon">✨</span>
          <div class="label" id="fl-output"></div>
          <div class="sublabel" id="fsl-output"></div>
        </div>
      </div>
      <div id="detailArea" style="min-height:100px;"></div>
    </div>

    <!-- AUTOREGRESSIVE -->
    <div class="case-container" id="c-autoregressive">
      <div class="gen-strip" id="ar-genstrip"></div>
      <div id="ar-detail" style="min-height:100px;"></div>
    </div>

    <!-- TRAINING -->
    <div class="case-container" id="c-training">
      <div id="tr-detail" style="min-height:140px;"></div>
    </div>

    <!-- CONTEXT WINDOW -->
    <div class="case-container" id="c-context">
      <div id="ctx-detail" style="min-height:100px;"></div>
    </div>

    <!-- HALLUCINATION -->
    <div class="case-container" id="c-hallucination">
      <div id="hal-detail" style="min-height:140px;"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btnPrev"></button>
      <div class="timeline" id="stepTrack"></div>
      <button class="ctrl-btn primary" id="btnNext"></button>
      <button class="ctrl-btn" id="btnReset" style="margin-left:20px;"></button>
    </div>
  </div>

  <div class="story-panel">
    <span class="tag" id="tag"></span>
    <h2 class="story-title" id="storyTitle"></h2>
    <p class="story-desc" id="storyDesc"></p>
    <div class="data-grid" id="dataGrid"></div>
  </div>
</div>

<script>
const LANGS=['id','en'];
let currentLang=new URLSearchParams(window.location.search).get('lang')||localStorage.getItem('lang')||'en';
let i18n=null;
let currentCase='pipeline';
let currentStep=0;

const flowNodes=['input','tokenize','embed','attention','output'];
const flowArrows=[1,2,3,4];

async function loadData(){
  const res=await fetch(`i18n/llm.${currentLang}.json`);
  i18n=await res.json();
}

function updateStaticUI(){
  document.documentElement.lang=currentLang;
  document.title=i18n.documentTitle;
  document.getElementById('eyebrow').textContent=i18n.eyebrow;
  document.getElementById('h1').innerHTML=i18n.h1Prefix+'<span>'+i18n.h1Highlight+'</span>'+i18n.h1Suffix;
  document.getElementById('lede').textContent=i18n.lede;

  document.getElementById('tab-pipeline').textContent=i18n.cases.pipeline;
  document.getElementById('tab-autoregressive').textContent=i18n.cases.autoregressive;
  document.getElementById('tab-training').textContent=i18n.cases.training;
  document.getElementById('tab-context').textContent=i18n.cases.context;
  document.getElementById('tab-hallucination').textContent=i18n.cases.hallucination;

  document.getElementById('fl-input').textContent=i18n.flowNodes.input;
  document.getElementById('fl-tokenize').textContent=i18n.flowNodes.tokenize;
  document.getElementById('fl-embed').textContent=i18n.flowNodes.embed;
  document.getElementById('fl-attention').textContent=i18n.flowNodes.attention;
  document.getElementById('fl-output').textContent=i18n.flowNodes.output;

  document.getElementById('fsl-input').textContent=i18n.flowSub.input;
  document.getElementById('fsl-tokenize').textContent=i18n.flowSub.tokenize;
  document.getElementById('fsl-embed').textContent=i18n.flowSub.embed;
  document.getElementById('fsl-attention').textContent=i18n.flowSub.attention;
  document.getElementById('fsl-output').textContent=i18n.flowSub.output;

  document.getElementById('btnPrev').innerHTML=i18n.controls.prev;
  document.getElementById('btnReset').innerHTML=i18n.controls.reset;

  const ls=document.getElementById('langSwitch');
  ls.innerHTML='';
  LANGS.forEach(l=>{
    const b=document.createElement('button');
    b.className='lang-btn'+(l===currentLang?' active':'');
    b.innerText=l.toUpperCase();
    b.onclick=()=>setLang(l);
    ls.appendChild(b);
  });
}

/* ---------- PIPELINE (existing inference walkthrough) ---------- */
function clearDetail(){
  document.getElementById('detailArea').innerHTML='';
}

function showTokenization(){
  const area=document.getElementById('detailArea');
  area.innerHTML='<div class="token-grid" id="tokenGrid"></div>';
  const grid=document.getElementById('tokenGrid');
  const tokens=i18n.tokenExample;
  tokens.forEach((t,i)=>{
    const chip=document.createElement('div');
    chip.className='token-chip';
    chip.innerHTML=t.text+'<span class="tok-id">'+t.id+'</span>';
    grid.appendChild(chip);
    setTimeout(()=>chip.classList.add('show'),200+i*120);
  });
}

function showEmbedding(){
  const area=document.getElementById('detailArea');
  area.innerHTML='<div class="vector-display" id="vecDisplay"></div>';
  const disp=document.getElementById('vecDisplay');
  const vectors=i18n.vectorExample;
  vectors.forEach((v,i)=>{
    const bar=document.createElement('div');
    bar.className='vector-bar';
    bar.innerHTML='<div class="vector-fill" style="height:0%"></div><div class="vector-label">'+v.label+'</div>';
    disp.appendChild(bar);
    setTimeout(()=>{
      bar.classList.add('show');
      bar.querySelector('.vector-fill').style.height=v.height+'%';
    },200+i*150);
  });
}

function showAttention(){
  const area=document.getElementById('detailArea');
  area.innerHTML='<div style="text-align:center;padding:20px 0;"><div style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--text-muted);margin-bottom:12px;">'+i18n.attentionNote+'</div><div id="attentionDemo" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"></div></div>';
  const demo=document.getElementById('attentionDemo');
  const pairs=i18n.attentionPairs;
  pairs.forEach((p,i)=>{
    const el=document.createElement('div');
    el.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;text-align:center;opacity:0;transform:translateY(8px);transition:all 0.4s;';
    el.innerHTML='<div style="font-size:18px;margin-bottom:4px;">🔗</div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:13px;font-weight:600;color:var(--text);">'+p.pair+'</div><div style="font-size:11px;color:var(--text-faint);margin-top:4px;">'+p.meaning+'</div>';
    demo.appendChild(el);
    setTimeout(()=>{el.style.opacity='1';el.style.transform='translateY(0)';},200+i*180);
  });
}

function showPrediction(){
  const area=document.getElementById('detailArea');
  area.innerHTML='<div class="prediction-output" id="predOutput"></div>';
  const out=document.getElementById('predOutput');
  i18n.predTokens.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='pred-token';
    el.textContent=t;
    el.style.margin='0 4px';
    out.appendChild(el);
    setTimeout(()=>el.classList.add('show'),300+i*250);
  });
}

function resetPipeline(){
  flowNodes.forEach(n=>document.getElementById('fn-'+n).classList.remove('active'));
  flowArrows.forEach(a=>document.getElementById('fa-'+a).classList.remove('active'));
  clearDetail();
}

function renderPipeline(step){
  flowNodes.forEach((n,i)=>{
    const el=document.getElementById('fn-'+n);
    el.classList.remove('active');
    if(i<=step) el.classList.add('active');
  });
  flowArrows.forEach(a=>{
    const el=document.getElementById('fa-'+a);
    el.classList.remove('active');
    if(a<=step) el.classList.add('active');
  });

  clearDetail();
  if(step===1) showTokenization();
  else if(step===2) showEmbedding();
  else if(step===3) showAttention();
  else if(step===4) showPrediction();
}

/* ---------- AUTOREGRESSIVE ---------- */
function renderCandidateList(cands){
  return '<div class="cand-list">' + cands.map((c,i)=>{
    const isWinner = i===0;
    return '<div class="cand-row'+(isWinner?' winner':'')+'"><span class="cand-tok">'+c.tok+'</span>'+
      '<div class="cand-bar-track"><div class="cand-bar-fill" style="width:'+c.pct+'%"></div></div>'+
      '<span class="cand-pct">'+c.pct+'%</span></div>';
  }).join('') + '</div>';
}
function resetAutoregressive(){
  document.getElementById('ar-genstrip').innerHTML='';
  document.getElementById('ar-detail').innerHTML='';
}
function renderAutoregressive(step){
  const data=i18n.steps.autoregressive[step];
  document.getElementById('ar-genstrip').innerHTML=(data.generated||'').replace(/\*\*(.+?)\*\*/g,'<span class="new-tok">$1</span>');
  const detail=document.getElementById('ar-detail');
  if(data.candidates){
    detail.innerHTML=renderCandidateList(data.candidates);
  } else if(data.tempCompare){
    detail.innerHTML='<div class="temp-compare">'+
      '<div class="temp-col"><div class="temp-col-label">🥶 Low Temperature</div>'+renderCandidateList(data.tempCompare.low)+'</div>'+
      '<div class="temp-col"><div class="temp-col-label">🔥 High Temperature</div>'+renderCandidateList(data.tempCompare.high)+'</div>'+
    '</div>';
  } else {
    detail.innerHTML='';
  }
}

/* ---------- TRAINING ---------- */
function resetTraining(){ document.getElementById('tr-detail').innerHTML=''; }
function renderTraining(step){
  const data=i18n.steps.training[step];
  const el=document.getElementById('tr-detail');
  let html='';
  if(data.corpus){
    html+='<div class="corpus-line">'+data.corpus.replace('___','<span class="blank">___</span>')+'</div>';
  }
  if(data.guess){
    html+='<div class="guess-row"><div class="guess-chip wrong">🤖 '+data.guess+'</div>';
    if(data.correct) html+='<div class="guess-chip correct">✓ '+data.correct+'</div>';
    html+='</div>';
  }
  if(typeof data.loss==='number'){
    html+='<div class="loss-meter"><div class="capacity-label"><span>LOSS</span><span>'+data.loss+'%</span></div>'+
      '<div class="loss-track"><div class="loss-fill" style="width:'+data.loss+'%"></div></div></div>';
  }
  if(data.weightsAdjusted){
    html+='<div class="weight-grid" id="weightGrid"></div>';
  }
  el.innerHTML=html;
  if(data.weightsAdjusted){
    const grid=document.getElementById('weightGrid');
    for(let i=0;i<48;i++){
      const cell=document.createElement('div');
      cell.className='weight-cell';
      grid.appendChild(cell);
    }
    const idxs=[...Array(48).keys()].sort(()=>Math.random()-0.5).slice(0,16);
    idxs.forEach((idx,i)=>{
      setTimeout(()=>{ if(grid.children[idx]) grid.children[idx].classList.add('adjusted'); },i*40);
    });
  }
}

/* ---------- CONTEXT WINDOW ---------- */
function resetContext(){ document.getElementById('ctx-detail').innerHTML=''; }
function renderContext(step){
  const data=i18n.steps.context[step];
  const pct=data.usedPct||0;
  document.getElementById('ctx-detail').innerHTML=
    '<div class="capacity-box">'+
      '<div class="capacity-label"><span>CONTEXT USED</span><span>'+pct+'%</span></div>'+
      '<div class="capacity-track"><div class="capacity-fill'+(data.overflow?' overflow':'')+'" style="width:'+pct+'%"></div></div>'+
    '</div>';
}

/* ---------- HALLUCINATION ---------- */
function resetHallucination(){ document.getElementById('hal-detail').innerHTML=''; }
function renderHallucination(step){
  const steps=i18n.steps.hallucination;
  const data=steps[step];
  let html='<div class="q-card">❓ '+steps[0].question+'</div>';
  if(data.answer){
    html+='<div class="answer-card'+(data.isFake?' fake':'')+'">'+data.answer+(data.isFake?'<div class="fake-badge">⚠ FABRICATED</div>':'')+'</div>';
  }
  if(data.mitigations){
    html+='<div class="mitigation-list">'+data.mitigations.map(m=>'<div class="mitigation-chip">✓ '+m+'</div>').join('')+'</div>';
  }
  document.getElementById('hal-detail').innerHTML=html;
}

/* ---------- generic step render ---------- */
const RENDERERS={pipeline:renderPipeline,autoregressive:renderAutoregressive,training:renderTraining,context:renderContext,hallucination:renderHallucination};
const RESETTERS={pipeline:resetPipeline,autoregressive:resetAutoregressive,training:resetTraining,context:resetContext,hallucination:resetHallucination};

function setCase(c){
  currentCase=c;
  currentStep=0;

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+c).classList.add('active');

  document.querySelectorAll('.case-container').forEach(cc=>cc.classList.remove('active'));
  document.getElementById('c-'+c).classList.add('active');

  document.getElementById('pipelineLabel').textContent = c==='pipeline' ? i18n.pipelineLabel : '';

  RESETTERS[c]();
  renderStep();
}

function renderStep(){
  const steps=i18n.steps[currentCase];
  const data=steps[currentStep];

  RENDERERS[currentCase](currentStep);

  document.getElementById('tag').textContent=data.tag;
  document.getElementById('storyTitle').textContent=data.title;
  document.getElementById('storyDesc').textContent=data.desc;

  const grid=document.getElementById('dataGrid');
  grid.innerHTML='';
  data.fields.forEach(([lbl,val])=>{
    grid.innerHTML+='<div class="data-card"><div class="data-label">'+lbl+'</div><div class="data-val">'+val+'</div></div>';
  });

  const track=document.getElementById('stepTrack');
  track.innerHTML='';
  for(let i=0;i<steps.length;i++){
    let cls='dot';
    if(i<currentStep)cls+=' done';
    if(i===currentStep)cls+=' now';
    track.innerHTML+='<div class="'+cls+'"></div>';
  }

  document.getElementById('btnPrev').disabled=(currentStep===0);
  document.getElementById('btnNext').innerHTML=(currentStep===steps.length-1)?i18n.controls.done:i18n.controls.next;
}

document.getElementById('btnNext').onclick=()=>{const len=i18n.steps[currentCase].length; if(currentStep<len-1){currentStep++;renderStep();}};
document.getElementById('btnPrev').onclick=()=>{if(currentStep>0){currentStep--;renderStep();}};
document.getElementById('btnReset').onclick=()=>{currentStep=0;renderStep();};

async function setLang(l){
  if(l===currentLang)return;
  currentLang=l;
  localStorage.setItem('lang',l);
  const u=new URL(window.location);
  u.searchParams.set('lang',l);
  history.replaceState(null,'',u);

  await loadData();
  updateStaticUI();
  document.getElementById('pipelineLabel').textContent = currentCase==='pipeline' ? i18n.pipelineLabel : '';
  renderStep();

  if(window.parent!==window){
    window.parent.postMessage({type:'howitworks:lang-change',lang:l},'*');
  }
}

async function init(){
  await loadData();
  updateStaticUI();
  setTimeout(()=>{
    setCase('pipeline');
    document.getElementById('loadingNote').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('loadingNote').style.display='none';
      document.getElementById('wrap').style.opacity='1';
    },500);
  },300);
}

init();
</script>
